<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="한글 문서 PDF 변환기">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6fed"/>
      <stop offset="1" stop-color="#5b8bff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1b3f8f" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Maskable-safe background: full bleed gradient rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- All meaningful content kept within the central ~80% safe zone (52..460) -->
  <g filter="url(#soft)">
    <!-- Document page -->
    <rect x="120" y="96" width="220" height="288" rx="26" ry="26" fill="#ffffff"/>
    <!-- Folded corner -->
    <path d="M300 96 L340 136 L300 136 Z" fill="#d9e4ff"/>

    <!-- Korean glyph "한" on the page -->
    <text x="160" y="232" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif"
          font-size="138" font-weight="800" fill="#2f6fed">한</text>

    <!-- Conversion arrow -->
    <path d="M150 300 L300 300" stroke="#5b8bff" stroke-width="22" stroke-linecap="round"/>
    <path d="M286 276 L322 300 L286 324 Z" fill="#5b8bff"/>
  </g>

  <!-- PDF badge -->
  <g filter="url(#soft)">
    <rect x="262" y="280" width="160" height="92" rx="22" ry="22" fill="#ff4d4f"/>
    <text x="342" y="343" text-anchor="middle"
          font-family="'Helvetica Neue',Arial,sans-serif" font-size="54" font-weight="800"
          fill="#ffffff" letter-spacing="2">PDF</text>
  </g>
</svg>
